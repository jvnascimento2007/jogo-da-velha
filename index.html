<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Jogo da Velha</title>
</head>
<body>
    <main>
        <section id="tictactoe">
            <h1>Tic Tac Toe | Jogo da Velha</h1>
            <div id="game">
                <span index="0" class="space"></span>
                <span index="1" class="space"></span>
                <span index="2" class="space"></span>
                <span index="3" class="space"></span>
                <span index="4" class="space"></span>
                <span index="5" class="space"></span>
                <span index="6" class="space"></span>
                <span index="7" class="space"></span>
                <span index="8" class="space"></span>
            </div>
            <p id="game-message">
            </p>
            <button id="reset-button">Resetar</button>
        </section>
    </main>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
